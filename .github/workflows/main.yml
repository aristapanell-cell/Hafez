name: Release Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-releases:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Cache release data
      uses: actions/cache@v3
      with:
        path: cache.json
        key: release-cache-${{ github.run_id }}
        restore-keys: |
          release-cache-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp
    
    - name: Run release bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python main.py
    
    - name: Upload cache artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cache
        path: cache.json
        retention-days: 7
    
    - name: Upload logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bot-logs
        path: bot.log
        retention-days: 7
